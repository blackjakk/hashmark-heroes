<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>sprite atlas runtime diagnostic</title>
<style>
  body { background: #111; color: #ddd; font-family: monospace; padding: 20px; font-size: 13px; line-height: 1.5; }
  .ok { color: #5f5; } .bad { color: #f55; } .warn { color: #ffd54a; }
  h1 { font-size: 16px; margin: 0 0 12px; }
  pre { background: #1a1a1a; padding: 12px; border: 1px solid #333; overflow: auto; }
  table { border-collapse: collapse; }
  td, th { padding: 4px 12px; border-bottom: 1px solid #2a2a2a; text-align: left; }
  canvas { background: #1a3a1a; image-rendering: pixelated; margin: 4px; }
</style>
</head>
<body>
<h1>Sprite atlas runtime diagnostic</h1>
<div id="report">running…</div>
<h2 style="font-size:14px;margin:20px 0 6px;">Live drawPlayerSprite() test (32 sprites, mixed poses)</h2>
<div id="canvases"></div>

<script src="play-sprites.js"></script>
<script>
async function run() {
  // Wait 3s for sprite preload to complete
  await new Promise(r => setTimeout(r, 3000));

  const report = document.getElementById('report');
  const lines = [];

  // 1. Is the atlas live?
  if (typeof drawPlayerSprite !== 'function') {
    lines.push('<span class="bad">FAIL: drawPlayerSprite is not defined on window. play-sprites.js did not load or did not expose it.</span>');
    report.innerHTML = lines.join('<br>');
    return;
  }
  lines.push('<span class="ok">OK: drawPlayerSprite exists</span>');

  // 2. Stats from atlas
  const stats = SpriteAtlas.stats();
  lines.push(`<span class="${stats.enabled ? 'ok' : 'bad'}">${stats.enabled ? 'OK' : 'FAIL'}: _spritesEnabled = ${stats.enabled}</span>`);
  lines.push(`atlas keys: ${stats.poseKeys.length} pose entries`);
  lines.push(`cache: <span class="ok">loaded=${stats.loaded}</span> <span class="warn">loading=${stats.loading}</span> <span class="bad">404=${stats.missing}</span> total=${stats.total}`);

  // 3. Test draws for each pose
  const canvases = document.getElementById('canvases');
  const testCases = [
    {pose:'run', dir:'south', desc:'run S'},
    {pose:'run', dir:'east', desc:'run E'},
    {pose:'carry', dir:'south', desc:'carry S (→run alias)'},
    {pose:'tackled', dir:'south', desc:'tackled S (→fall)'},
    {pose:'engage', dir:'east', desc:'engage E (→block)'},
    {pose:'reach', dir:'east', desc:'reach E (→catch)'},
    {pose:'dive', dir:'south', desc:'dive S (→tackle)'},
    {pose:'celebrate', dir:'south', desc:'celebrate S'},
    {pose:'stance', dir:'south', desc:'stance S'},
    {pose:'pass', dir:'south', desc:'pass S'},
    {pose:'kick', dir:'east', desc:'kick E'},
    {pose:'kick', dir:'south', desc:'kick S (no N/S → expect false)'},
    {pose:'dodge', dir:'south', desc:'dodge S'},
    {pose:'idle', dir:'south', desc:'idle S'},
    {pose:'backpedal', dir:'south', desc:'backpedal (no folder → expect false)'},
    {pose:'hit', dir:'south', desc:'hit (no folder → expect false)'},
  ];

  let trueCount = 0, falseCount = 0;
  for (const tc of testCases) {
    const c = document.createElement('canvas');
    c.width = 80; c.height = 80;
    const cx = c.getContext('2d');
    cx.fillStyle = '#1a3a1a';
    cx.fillRect(0, 0, 80, 80);
    cx.save();
    cx.translate(40, 40);
    // Use velocity to imply direction; for south, vy>0
    let vx = 0, vy = 0;
    if (tc.dir === 'south') vy = 1;
    else if (tc.dir === 'north') vy = -1;
    else if (tc.dir === 'east') vx = 1;
    else if (tc.dir === 'west') vx = -1;
    const ok = drawPlayerSprite(cx, tc.pose, 0.5, vx, vy, '#ff5050', 1);
    cx.restore();
    if (ok) trueCount++; else falseCount++;
    const wrap = document.createElement('div');
    wrap.style.display = 'inline-block';
    wrap.style.textAlign = 'center';
    wrap.style.margin = '2px';
    wrap.appendChild(c);
    const lbl = document.createElement('div');
    lbl.style.cssText = 'font-size:10px;color:' + (ok ? '#5f5' : '#f55') + ';';
    lbl.textContent = tc.desc + ' → ' + ok;
    wrap.appendChild(lbl);
    canvases.appendChild(wrap);
  }

  lines.push(`<br><b>drawPlayerSprite calls:</b> <span class="ok">true=${trueCount}</span> <span class="bad">false=${falseCount}</span> / ${testCases.length} cases`);

  // 4. lastMiss
  const stats2 = SpriteAtlas.stats();
  lines.push(`<br>lastMiss after tests: <pre>${JSON.stringify(stats2.lastMiss, null, 2)}</pre>`);

  // 5. Peek at a specific entry
  const peek = SpriteAtlas.peek('run', 'south', 0);
  const peekStr = peek.value == null ? 'null/missing' : peek.value === 'loading' ? 'still loading' : `Image ${peek.value.width}x${peek.value.height}`;
  lines.push(`Peek run|south|0: ${peekStr}`);

  // 6. Verdict
  if (stats.enabled && stats.loaded > 0 && trueCount > 0) {
    lines.push('<br><span class="ok"><b>VERDICT: atlas works. If sprites still aren\'t visible in-game, the issue is in the integration call site, not the atlas.</b></span>');
  } else {
    lines.push('<br><span class="bad"><b>VERDICT: atlas broken. See errors above.</b></span>');
  }
  report.innerHTML = lines.join('<br>');
}
run();
</script>
</body>
</html>
