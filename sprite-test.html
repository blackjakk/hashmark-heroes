<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>sprite atlas test</title>
<style>
  body { background: #1a1a1a; color: #ddd; font-family: monospace; padding: 16px; }
  h2 { margin: 24px 0 6px; font-size: 14px; letter-spacing: 0.5px; }
  .pose { border: 1px solid #333; padding: 8px; margin-bottom: 12px; }
  .pose-title { color: #ffd54a; margin-bottom: 6px; }
  .row { display: grid; grid-template-columns: 80px repeat(8, 1fr); gap: 4px; align-items: center; }
  .dir-label { color: #888; font-size: 10px; text-align: right; padding-right: 4px; }
  .cell { width: 64px; height: 64px; background: #222; border: 1px solid #2a2a2a; display: flex; align-items: center; justify-content: center; }
  .cell.empty { background: #2a1a1a; color: #f55; font-size: 9px; }
  img { image-rendering: pixelated; }
  .stats { background: #111; padding: 8px; border: 1px solid #333; margin-bottom: 16px; }
  .stats span { display: inline-block; margin-right: 16px; }
  .controls { margin-bottom: 12px; }
  .controls label { margin-right: 12px; }
  .controls input { background: #222; color: #ddd; border: 1px solid #444; padding: 2px 6px; width: 60px; }
</style>
</head>
<body>
<h1 style="margin:0 0 8px 0;font-size:16px;">PixelLab sprite atlas — wiring test</h1>
<div class="stats" id="stats">loading…</div>
<div class="controls">
  <label>scale: <input type="range" id="scale" min="0.1" max="1.0" step="0.05" value="0.6"></label>
  <label>team color: <input type="color" id="color" value="#ffffff"></label>
  <label>frame: <input type="number" id="frame" min="0" max="3" value="0"></label>
</div>
<div id="grid"></div>

<script src="play-sprites.js"></script>
<script>
// Wait for the atlas to finish loading then render every (pose, dir, frame).
function getMapping() {
  // Use globals from play-sprites.js — we replicate the structure here for rendering.
  return {
    idle:      { folder: "idle",      frames: 1 },
    stance:    { folder: "stance",    frames: 4 },
    run:       { folder: "run",       frames: 4 },
    celebrate: { folder: "celebrate", frames: 4 },
    carry:     { folder: "run",       frames: 4 },
    tackled:   { folder: "fall",      frames: 4 },
    engage:    { folder: "block",     frames: 4 },
    reach:     { folder: "catch",     frames: 4 },
    dive:      { folder: "tackle",    frames: 4 },
    sack:      { folder: "fall",      frames: 4 },
    ragdoll:   { folder: "fall",      frames: 4 },
    pass:      { folder: "pass",      frames: 4 },
    kick:      { folder: "kick",      frames: 4, dirs: ["south-east","east","north-east","north-west","west","south-west"] },
    dodge:     { folder: "dodge",     frames: 4 },
  };
}
const DIRS = ["south","south-east","east","north-east","north","north-west","west","south-west"];

function render() {
  const mapping = getMapping();
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const scale = +document.getElementById('scale').value;
  const color = document.getElementById('color').value;
  const frame = +document.getElementById('frame').value;

  let total = 0, loaded = 0, missing = 0;
  for (const [pose, def] of Object.entries(mapping)) {
    const dirs = def.dirs || DIRS;
    const poseBox = document.createElement('div');
    poseBox.className = 'pose';
    const title = document.createElement('div');
    title.className = 'pose-title';
    title.textContent = `${pose}  (folder: ${def.folder}, ${def.frames} frames)`;
    poseBox.appendChild(title);
    const row = document.createElement('div');
    row.className = 'row';
    row.appendChild(makeCell('', 'dir-label', '<span style="font-size:9px;">frame ' + frame + '</span>'));
    for (const dir of DIRS) {
      total++;
      if (!dirs.includes(dir)) {
        row.appendChild(makeCell(dir, 'cell empty', '(skip)'));
        continue;
      }
      const url = `sprites/${def.folder}/` + (def.frames === 1 ? `${dir}.png` : `${dir}_${Math.min(frame, def.frames-1)}.png`);
      const cell = document.createElement('div');
      cell.className = 'cell';
      const img = new Image();
      img.style.width = (104 * scale) + 'px';
      img.style.height = (104 * scale) + 'px';
      img.onload = () => { loaded++; updateStats(total, loaded, missing); };
      img.onerror = () => {
        missing++;
        cell.classList.add('empty');
        cell.textContent = '404';
        updateStats(total, loaded, missing);
      };
      img.src = url;
      cell.appendChild(img);
      // Add direction label below
      const wrap = document.createElement('div');
      wrap.style.textAlign = 'center';
      wrap.appendChild(cell);
      const lbl = document.createElement('div');
      lbl.style.cssText = 'font-size:9px;color:#666;margin-top:2px;';
      lbl.textContent = dir;
      wrap.appendChild(lbl);
      row.appendChild(wrap);
    }
    poseBox.appendChild(row);
    grid.appendChild(poseBox);
  }
}

function makeCell(text, cls, inner) {
  const d = document.createElement('div');
  d.className = cls;
  d.innerHTML = inner != null ? inner : text;
  return d;
}

function updateStats(total, loaded, missing) {
  document.getElementById('stats').innerHTML =
    `<span>total cells: ${total}</span>` +
    `<span style="color:#5f5">loaded: ${loaded}</span>` +
    `<span style="color:#f55">404: ${missing}</span>` +
    `<span style="color:#aaa">pending: ${total - loaded - missing}</span>` +
    `<span style="color:#ffd54a;font-weight:bold">${loaded > 0 ? '✓ ATLAS WIRED' : '✗ NOTHING LOADED'}</span>`;
}

document.getElementById('scale').addEventListener('input', render);
document.getElementById('color').addEventListener('input', render);
document.getElementById('frame').addEventListener('input', render);
render();
</script>
</body>
</html>
